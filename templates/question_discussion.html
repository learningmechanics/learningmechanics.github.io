<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- GA_SCRIPT -->

  <link rel="icon" href="/static/lm_favicon.png" type="image/png">
  <title>{{TITLE}}</title>

  <!-- KATEX -->
  <script defer src="/static/math-render.js"></script>

  <!-- FONT_AWESOME -->

  <link rel="stylesheet" href="/static/style.css">

  <meta name="description" content="Discussion page for open question: {{TITLE}}">
</head>
<body id="top">

<!-- NAV -->

<div class="post-grid">

  <div class="post-header">
    <p class="sequence-nav-bar" style="padding-top:0; margin-bottom:0.5em;">
      <a href="/openquestions">← Open Questions</a>
    </p>
    <h1>{{TITLE}}</h1>
  </div>

  <article class="post-body">
    <div class="question-box">
      <p><strong>Open Question {{NUMBER}}:</strong> {{TEXT}}</p>
    </div>
    <div class="oq-links" style="margin-top:0.5em;">
      <div class="oq-see-all">
        <a href="/{{CONTEXT_POST}}#{{ID}}">See question in context</a>
        &nbsp;·&nbsp;
        <a href="/openquestions#{{ID}}">All open questions</a>
      </div>
    </div>

    <p style="margin-top: 2.5em; color: var(--meta-color); font-size: 0.9rem;">
      Share ideas, approaches, or relevant research in the comments below.
    </p>
  </article>

  <div class="comments-section">
    <h2>Discussion</h2>
    <script>
      (function() {
        var theme = localStorage.getItem('theme') || 'light';
        var s = document.createElement('script');
        s.src = 'https://giscus.app/client.js';
        s.setAttribute('data-repo', 'learningmechanics/learningmechanics.github.io');
        s.setAttribute('data-repo-id', 'R_kgDOO_nSsA');
        s.setAttribute('data-category', 'Open Questions');
        s.setAttribute('data-category-id', 'DIC_kwDOO_nSsM4Cualh');
        s.setAttribute('data-mapping', 'pathname');
        s.setAttribute('data-strict', '0');
        s.setAttribute('data-reactions-enabled', '0');
        s.setAttribute('data-emit-metadata', '0');
        s.setAttribute('data-input-position', 'bottom');
        s.setAttribute('data-theme', theme);
        s.setAttribute('data-lang', 'en');
        s.setAttribute('crossorigin', 'anonymous');
        s.async = true;
        document.currentScript.parentNode.appendChild(s);
      })();
    </script>
  </div>

</div>

<!-- THEME_SCRIPT -->
</body>
</html>
