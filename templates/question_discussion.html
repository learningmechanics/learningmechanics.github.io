<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- GA_SCRIPT -->

  <title>{{TITLE}} - Learning Mechanics</title>

  <!-- KATEX -->
  <script defer src="/static/math-render.js"></script>

  <!-- FONT_AWESOME -->

  <link rel="stylesheet" href="/static/style.css">

  <meta name="description" content="Discussion page for open question: {{TITLE}}">
</head>
<body id="top">
  <a href="/" class="home-glyph"><i class="fas fa-home"></i></a>
  <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-sun"></i></button>

  <article>
    <header>
      <div class="sequence-header">
        <h1 class="sequence-name">Open Question {{NUMBER}}</h1>
      </div>
      <h1>{{TITLE}}</h1>
      <hr class="title-separator">
    </header>

    <main>
      <div class="question-box">
        <p><strong>Open Question {{NUMBER}}: {{TITLE}}</strong> {{TEXT}}</p>
      </div>
      <div class="oq-links">
        <div class="oq-see-all"><a href="/{{CONTEXT_POST}}#{{ID}}">See question in context</a> | <a href="/openquestions#{{ID}}">See all open questions</a></div>
      </div>

      <p style="margin-top: 2rem;">
        This is a discussion page for the open question above. Feel free to share ideas, approaches, or relevant research in the comments below.
      </p>
    </main>
  </article>

  <div class="comments">
    <h2>Discussion</h2>
    <script>
      (function() {
        var theme = localStorage.getItem('theme') || 'light';
        var s = document.createElement('script');
        s.src = 'https://giscus.app/client.js';
        s.setAttribute('data-repo', 'learningmechanics/learningmechanics.github.io');
        s.setAttribute('data-repo-id', 'R_kgDOO_nSsA');
        s.setAttribute('data-category', 'Open Questions');
        s.setAttribute('data-category-id', 'DIC_kwDOO_nSsM4Cualh');
        s.setAttribute('data-mapping', 'pathname');
        s.setAttribute('data-strict', '0');
        s.setAttribute('data-reactions-enabled', '0');
        s.setAttribute('data-emit-metadata', '0');
        s.setAttribute('data-input-position', 'bottom');
        s.setAttribute('data-theme', theme);
        s.setAttribute('data-lang', 'en');
        s.setAttribute('crossorigin', 'anonymous');
        s.async = true;
        document.currentScript.parentNode.appendChild(s);
      })();
    </script>
  </div>

  <!-- THEME_SCRIPT -->
</body>
</html>
